<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026年 参加登録・会費管理 (Ver 2.0)</title>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Warm Attendance List (Ver 2.0)</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        peach: "#FFEDD5",
                        cream: "#FFFBF2",
                        terracotta: "#E2725B",
                        warmOrange: "#F97316",
                        softBlue: "#BAE6FD",
                        warmGray: "#78716C",
                    },
                    fontFamily: {
                        rounded: ["'M PLUS Rounded 1c'", "sans-serif"],
                    },
                    borderRadius: {
                        'xl': '1.5rem',
                        '2xl': '2rem',
                    }
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-rounded bg-cream text-warmGray min-h-screen relative overflow-x-hidden;
            }
        }
        .organic-shape {
            position: fixed;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.4;
        }
        .tactile-btn {
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }
        .tactile-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.05);
        }
        .active-date {
            @apply bg-warmOrange text-white border-warmOrange scale-110;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }
        /* Existing functional animations */
        @keyframes sparkle-sweep {
            0% { transform: translateX(-100%) skewX(-15deg); }
            100% { transform: translateX(200%) skewX(-15deg); }
        }
        .status-badge {
            position: relative;
            display: flex;
            width: 100%;
            height: 39px;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.1);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
            font-size: 0.95rem;
        }
        .status-badge::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: translateX(-100%) skewX(-15deg);
            animation: sparkle-sweep 2s linear infinite;
        }
        .status-attend { background: linear-gradient(135deg, #2ecc71, #27ae60); border: 1px solid #27ae60; }
        .status-absent { background: linear-gradient(135deg, #e74c3c, #c0392b); border: 1px solid #c0392b; }

        /* Loading Spinner */
        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #FFEDD5;
            border-top: 4px solid #E2725B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tab Transitions */
        .tab-content { transition: opacity 0.35s ease, transform 0.35s ease; }
        .tab-content.slide-out-left { opacity: 0; transform: translateX(-30px); }
        .tab-content.slide-out-right { opacity: 0; transform: translateX(30px); }
        .tab-content.slide-in { opacity: 1; transform: translateX(0); }

        /* Fee Table specific */
        .fee-cell.paid { background-color: #2ecc71 !important; color: white; font-weight: bold; font-size: 1.1rem; }
        .fee-cell.paid::after { content: '済'; }
        .fee-cell.pending-paid { background-color: #F97316 !important; color: white !important; }
        .fee-cell.pending-remove { background-color: #E2725B !important; opacity: 0.7; color: white !important; }
        .fee-cell.pending-paid::after, .fee-cell.pending-remove::after { content: '...'; }
    </style>
</head>

<body class="pb-20">
    <div class="organic-shape bg-peach w-64 h-64 rounded-full -top-20 -left-20"></div>
    <div class="organic-shape bg-softBlue w-48 h-48 rounded-full top-1/2 -right-10"></div>
    <div class="organic-shape bg-terracotta w-32 h-32 rounded-full bottom-10 left-10 opacity-20"></div>

    <div id="loading"
        class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[9999] flex flex-col items-center justify-center gap-4"
        style="display: none;">
        <div class="loading-spinner"></div>
        <div class="loading-text font-bold text-warmGray" id="loading-text">データを読み込み中...</div>
    </div>
    <div id="toast"
        class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/80 text-white px-8 py-4 rounded-xl z-[10000] font-bold shadow-xl text-center"
        style="display: none;"></div>
    <button id="back-top"
        class="fixed bottom-24 right-6 w-12 h-12 rounded-full bg-terracotta text-white shadow-lg z-[100] transition-transform active:scale-90"
        style="display: none;">▲</button>

    <!-- パスワード入力モーダル -->
    <div id="password-modal"
        class="modal-overlay fixed inset-0 bg-black/50 z-[10000] flex items-center justify-center p-4"
        style="display: none;" onclick="closePasswordModal(event)">
        <div class="modal-box bg-white rounded-2xl p-8 w-full max-w-xs shadow-2xl text-center"
            onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold text-warmGray mb-6 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-terracotta">lock</span>
                管理者ログイン
            </h3>
            <input type="password" id="modal-password" placeholder="パスワード" autocomplete="off"
                class="w-full p-4 border-2 border-peach rounded-xl text-center mb-4 focus:ring-2 focus:ring-terracotta outline-none"
                onkeydown="if(event.key==='Enter')submitPassword()">
            <div id="modal-error" class="text-red-500 text-sm font-bold mb-4" style="display: none;">パスワードが違います</div>
            <div class="modal-buttons flex gap-3">
                <button class="flex-1 p-4 bg-cream text-warmGray font-bold rounded-xl"
                    onclick="closePasswordModal()">取消</button>
                <button class="flex-1 p-4 bg-terracotta text-white font-bold rounded-xl shadow-md"
                    onclick="submitPassword()">確定</button>
            </div>
        </div>
    </div>

    <!-- 確認モーダル -->
    <div id="confirm-modal"
        class="modal-overlay fixed inset-0 bg-black/50 z-[10000] flex items-center justify-center p-4"
        style="display: none;" onclick="closeConfirmModal(false)">
        <div class="modal-box bg-white rounded-2xl p-8 w-full max-w-xs shadow-2xl text-center"
            onclick="event.stopPropagation()">
            <h3 id="confirm-message" class="text-lg font-bold text-warmGray mb-8"></h3>
            <div class="modal-buttons flex gap-3">
                <button class="flex-1 p-4 bg-cream text-warmGray font-bold rounded-xl"
                    onclick="closeConfirmModal(false)">取消</button>
                <button class="flex-1 p-4 bg-terracotta text-white font-bold rounded-xl shadow-md"
                    onclick="closeConfirmModal(true)">はい</button>
            </div>
        </div>
    </div>

    <!-- お知らせ編集モーダル -->
    <div id="announcement-modal"
        class="modal-overlay fixed inset-0 bg-black/50 z-[10000] flex items-center justify-center p-4"
        style="display: none;" onclick="closeAnnouncementModal()">
        <div class="modal-box bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl text-center"
            onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold text-terracotta mb-6 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">campaign</span>
                お知らせ編集
            </h3>
            <textarea id="ann-edit-textarea"
                class="w-full min-h-[120px] p-4 border-2 border-peach rounded-xl mb-6 focus:ring-2 focus:ring-terracotta outline-none text-sm"
                placeholder="お知らせメッセージを入力..."></textarea>
            <div class="modal-buttons flex gap-3">
                <button class="flex-1 p-4 bg-cream text-warmGray font-bold rounded-xl"
                    onclick="closeAnnouncementModal()">取消</button>
                <button class="flex-1 p-4 bg-terracotta text-white font-bold rounded-xl shadow-md"
                    onclick="saveAnnouncement()">保存</button>
            </div>
        </div>
    </div>

    <header class="max-w-md mx-auto pt-8 px-5">
        <div class="flex items-center justify-between mb-8">
            <div class="flex flex-col">
                <span class="text-terracotta font-bold text-lg">2026</span>
                <h1 class="text-2xl font-extrabold text-warmGray tracking-tight leading-tight">
                    参加登録・会費
                </h1>
            </div>
            <button id="global-admin-btn" onclick="unlockFees()"
                class="w-12 h-12 rounded-full bg-white shadow-sm border border-peach flex items-center justify-center text-terracotta transition-all active:scale-95">
                <span id="admin-icon" class="material-symbols-outlined">person</span>
            </button>
        </div>

        <nav class="bg-white/80 backdrop-blur-sm p-1.5 rounded-2xl flex shadow-sm border border-peach mb-8 relative"
            id="tabs-container">
            <button id="tab-reg" onclick="switchView('reg')"
                class="flex-1 py-3 px-2 rounded-xl font-bold transition-all bg-terracotta text-white flex items-center justify-center gap-2 text-sm z-10 transition-colors">
                <span class="material-symbols-outlined text-lg">event_available</span>
                参加登録
            </button>
            <button id="tab-fee" onclick="switchView('fee')"
                class="flex-1 py-3 px-2 rounded-xl font-bold transition-all text-warmGray/60 hover:bg-peach/30 flex items-center justify-center gap-2 text-sm z-10 transition-colors">
                <span class="material-symbols-outlined text-lg">receipt_long</span>
                会費管理
            </button>
            <!-- スライドインジケーターはNavの背景として機能するようにJSで調整、またはTailwind classで制御 -->
            <div class="tab-indicator absolute h-[calc(100%-12px)] top-1.5 rounded-xl bg-terracotta shadow-md transition-all duration-300"
                id="tab-indicator" style="display:none;"></div>
        </nav>

        <!-- お知らせエリア -->
        <div id="announcement-area" class="bg-peach/40 border border-peach rounded-2xl p-4 mb-8 flex items-start gap-3"
            style="display: none;">
            <span class="material-symbols-outlined text-terracotta mt-0.5">campaign</span>
            <div class="flex-1">
                <p id="announcement-text" class="text-xs font-bold text-warmGray leading-relaxed"></p>
            </div>
            <button id="ann-edit-btn" onclick="openAnnouncementEditor()"
                class="text-terracotta p-1 hover:bg-peach/50 rounded-lg transition-colors" style="display: none;">
                <span class="material-symbols-outlined text-lg">edit</span>
            </button>
        </div>
        <div id="announcement-empty"
            class="bg-cream border border-peach/50 border-dashed rounded-2xl p-4 mb-8 items-center justify-center gap-2 hidden admin-visible">
            <span class="material-symbols-outlined text-warmGray/40">campaign</span>
            <p class="text-xs font-bold text-warmGray/40 italic">お知らせを書く</p>
            <button onclick="openAnnouncementEditor()" class="text-terracotta ml-2">
                <span class="material-symbols-outlined text-lg">add_circle</span>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-5 pb-24">
        <!-- REGISTER VIEW -->
        <div id="view-reg" class="tab-content slide-in space-y-6">
            <!-- エラーバナー -->
            <div id="error-banner"
                class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl flex items-center justify-between shadow-sm"
                style="display: none;">
                <p class="text-xs font-bold" id="error-msg"></p>
                <button class="bg-red-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold"
                    id="error-retry">リトライ</button>
            </div>

            <div
                class="bg-peach/30 border border-peach/50 rounded-xl p-3 text-[10px] font-bold text-terracotta/80 text-center">
                ※ 同名での登録は最新の内容に上書きされます。
            </div>

            <div id="calendar-container" class="space-y-6"></div>

            <div id="form-section"
                class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-peach/50"
                style="display: none;">
                <div class="flex items-center gap-2 mb-6">
                    <span class="w-1.5 h-6 bg-terracotta rounded-full"></span>
                    <h2 id="form-date-title" class="text-xl font-extrabold text-warmGray"></h2>
                </div>
                <form id="attendanceForm" class="space-y-5">
                    <input type="hidden" id="field-date" name="date">
                    <div>
                        <label class="block text-xs font-bold text-warmGray/60 mb-2 ml-1">お名前</label>
                        <select id="field-name" name="name" required
                            class="w-full p-4 bg-cream border-2 border-peach rounded-xl font-bold focus:border-terracotta focus:ring-0 outline-none transition-colors">
                            <option value="">読込中...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-warmGray/60 mb-2 ml-1">参加状況</label>
                        <div class="flex gap-3">
                            <label
                                class="flex-1 flex items-center justify-center gap-2 p-4 bg-cream border-2 border-peach rounded-xl cursor-pointer transition-all has-[:checked]:bg-terracotta has-[:checked]:text-white has-[:checked]:border-terracotta shadow-sm">
                                <input type="radio" name="status" value="参加" checked class="hidden">
                                <span class="material-symbols-outlined text-lg">check_circle</span>
                                <span class="font-bold">参加</span>
                            </label>
                            <label
                                class="flex-1 flex items-center justify-center gap-2 p-4 bg-cream border-2 border-peach rounded-xl cursor-pointer transition-all has-[:checked]:bg-terracotta has-[:checked]:text-white has-[:checked]:border-terracotta shadow-sm">
                                <input type="radio" name="status" value="不参加" class="hidden">
                                <span class="material-symbols-outlined text-lg">cancel</span>
                                <span class="font-bold">不参加</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-warmGray/60 mb-2 ml-1">備考</label>
                        <input type="text" name="comment" placeholder="ひとことメッセージ"
                            class="w-full p-4 bg-cream border-2 border-peach rounded-xl font-bold focus:border-terracotta focus:ring-0 outline-none transition-colors">
                    </div>

                    <button type="submit" id="btn-submit"
                        class="w-full bg-terracotta text-white p-5 rounded-2xl shadow-lg font-bold text-lg active:scale-[0.98] transition-all disabled:opacity-50 mt-4 h-16 flex items-center justify-center gap-3">
                        <span class="material-symbols-outlined">send</span>
                        送信する
                    </button>
                </form>
            </div>

            <div id="result-section"
                class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-peach/50"
                style="display: none;">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-warmOrange rounded-full"></span>
                        <h2 id="result-header" class="text-xl font-extrabold text-warmGray">参加状況</h2>
                    </div>
                    <div id="stats-area"
                        class="flex gap-2 text-[10px] font-bold bg-cream px-3 py-1.5 rounded-full border border-peach/50">
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr
                                class="text-[10px] font-extrabold text-warmGray/30 uppercase tracking-widest border-b border-peach/20">
                                <th class="pb-3 px-1">名前</th>
                                <th class="pb-3 px-1 text-center">状況</th>
                                <th class="pb-3 px-1">備考</th>
                                <th class="pb-3 px-1 text-right th-action" style="display: none;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="result-body" class="divide-y divide-peach/10"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- FEE VIEW -->
        <div id="view-fee" class="tab-content" style="display: none;">
            <div id="fee-main-area"
                class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-peach/50">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-softBlue rounded-full"></span>
                        <h2 class="text-xl font-extrabold text-warmGray">会費支払い状況</h2>
                    </div>
                </div>

                <!-- Batch Control Panel -->
                <div id="fee-controls" class="flex gap-2 mb-6 justify-end" style="display: none;">
                    <button
                        class="bg-warmGray/10 text-warmGray px-4 py-2 rounded-xl text-xs font-bold hover:bg-warmGray/20 transition-colors"
                        onclick="resetFeeChanges()">元に戻す</button>
                    <button
                        class="bg-terracotta text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md active:scale-95 transition-transform"
                        onclick="saveFeeChanges()">一括保存</button>
                </div>

                <div class="overflow-x-auto -mx-2 px-2 scrollbar-hide">
                    <table class="w-full min-w-[500px] border-separate border-spacing-y-2">
                        <thead id="fee-head"
                            class="text-[10px] font-extrabold text-warmGray/30 uppercase tracking-widest"></thead>
                        <tbody id="fee-body" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-4 z-50">
        <!-- ページ内スクロール等の便利ボタンを想定 -->
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})"
            class="bg-white/80 backdrop-blur-md w-14 h-14 rounded-full shadow-lg border border-peach flex items-center justify-center text-terracotta active:scale-95 transition-transform">
            <span class="material-symbols-outlined text-2xl">arrow_upward</span>
        </button>
        <button onclick="unlockFees()"
            class="bg-terracotta text-white px-8 h-14 rounded-full shadow-lg flex items-center justify-center gap-2 font-bold active:scale-95 transition-transform">
            <span class="material-symbols-outlined text-xl">admin_panel_settings</span>
            管理者
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBMyqYZMC4ytIOPNIBXKe8th-mE-rmM27o",
            authDomain: "sunday-attendance.firebaseapp.com",
            projectId: "sunday-attendance",
            storageBucket: "sunday-attendance.firebasestorage.app",
            messagingSenderId: "292299944623",
            appId: "1:292299944623:web:5c982cc8a700e57d51da5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const API = "https://script.google.com/macros/s/AKfycbwGinDIpNmTDCIBMvPcAamn_rOLZEnDg1pCVa7Jl5AFnPItCaYuQ9yX0503ZMZVgv5-kg/exec";
        let STATE = { members: [], feeMembers: [], unlocked: false, selectedDate: null, pendingChanges: {}, currentView: 'reg' };

        const el = (id) => document.getElementById(id);
        const toast = (m) => { const t = el('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); };
        const loading = (v, msg) => {
            el('loading').style.display = v ? 'flex' : 'none';
            if (msg) el('loading-text').textContent = msg;
        };

        // インジケーターバーの位置を更新
        function updateIndicator() {
            const activeBtn = document.querySelector('.tab-btn.active');
            const indicator = el('tab-indicator');
            if (activeBtn && indicator) {
                indicator.style.left = activeBtn.offsetLeft + 'px';
                indicator.style.width = activeBtn.offsetWidth + 'px';
            }
        }

        // エラーバナー表示/非表示
        function showError(msg, retryFn) {
            const banner = el('error-banner');
            el('error-msg').textContent = msg;
            banner.classList.add('show');
            const retryBtn = el('error-retry');
            retryBtn.onclick = () => {
                banner.classList.remove('show');
                if (retryFn) retryFn();
            };
        }
        function hideError() {
            el('error-banner').classList.remove('show');
        }
        window.showError = showError;

        // グローバルに公開する関数 (Moduleのスコープから onclick 等でも呼べるようにする)
        window.switchView = switchView;
        window.unlockFees = unlockFees;
        window.closePasswordModal = closePasswordModal;
        window.submitPassword = submitPassword;
        window.closeConfirmModal = closeConfirmModal;
        window.loadFees = loadFees;
        window.resetFeeChanges = resetFeeChanges;
        window.saveFeeChanges = saveFeeChanges;
        window.selectDate = selectDate;
        window.toggleFeeLocal = toggleFeeLocal;
        window.openAnnouncementEditor = openAnnouncementEditor;
        window.closeAnnouncementModal = closeAnnouncementModal;
        window.saveAnnouncement = saveAnnouncement;
        window.deleteAttendanceRow = deleteAttendanceRow;

        function switchView(v) {
            if (STATE.currentView === v) return;

            const oldView = STATE.currentView;
            const outgoing = el('view-' + oldView);
            const incoming = el('view-' + v);

            // タブのアクティブ状態を即座に更新
            const tabReg = el('tab-reg');
            const tabFee = el('tab-fee');

            if (v === 'reg') {
                tabReg.className = 'flex-1 py-3 px-2 rounded-xl font-bold transition-all bg-terracotta text-white flex items-center justify-center gap-2 text-sm z-10';
                tabFee.className = 'flex-1 py-3 px-2 rounded-xl font-bold transition-all text-warmGray/60 hover:bg-peach/30 flex items-center justify-center gap-2 text-sm z-10';
            } else {
                tabReg.className = 'flex-1 py-3 px-2 rounded-xl font-bold transition-all text-warmGray/60 hover:bg-peach/30 flex items-center justify-center gap-2 text-sm z-10';
                tabFee.className = 'flex-1 py-3 px-2 rounded-xl font-bold transition-all bg-terracotta text-white flex items-center justify-center gap-2 text-sm z-10';
            }
            updateIndicator();

            const goingRight = (v === 'fee');
            outgoing.classList.remove('slide-in');

        // SHA-256ハッシュ化関数
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ハッシュ化された管理者パスワード (平文はソースに含まない)

        async function submitPassword() {

            const pwHash = await sha256(pw);
            if (pwHash === ADMIN_HASH) {

        let unsubscribeFees = null;
        async function loadFees() {

            hideError();
            STATE.pendingChanges = {}; // Clear pending

                snapshot.forEach(doc => {

                if (memberList.length === 0) {
                    Promise.all([
                        getDocs(collection(db, "members")),
                        getDocs(collection(db, "feeMembers"))
                    ]).then(([mSnap, fmSnap]) => {
                        STATE.members = mSnap.docs.map(d => d.data()).sort((a, b) => (a.order || 0) - (b.order || 0));
                        STATE.feeMembers = fmSnap.docs.map(d => d.data()).sort((a, b) => (a.order || 0) - (b.order || 0));
                        loadFees();
                    }).catch(err => {
                        console.error("Member fetch error in loadFees:", err);

                        loading(false);

                memberList = memberList.map(m => {

                    monthHeaders.forEach((_, i) => {
                        if (feesData[m.name] && feesData[m.name][`session${i + 1}`] === 1) count++;
                    });
                    return { ...m, _count: count };
                }).sort((a, b) => b._count - a._count || (a.order || 0) - (b.order || 0));

                    tdCount.className = 'p-4 text-center font-extrabold text-terracotta border-b border-peach/20 bg-white last:rounded-r-xl';
                    tdCount.textContent = m._count;

            });

        function toggleFeeLocal(td) {
            const id = td.dataset.id;
            const currentVal = parseInt(td.dataset.current);
            let pendingVal = STATE.pendingChanges[id];

            // If no pending change, invert current
            if (pendingVal === undefined) {
                pendingVal = currentVal === 1 ? 0 : 1;
            } else {
                // If pending change exists, toggle it (0->1, 1->0)
                // If toggled back to original, remove pending
                pendingVal = pendingVal === 1 ? 0 : 1;
                if (pendingVal === currentVal) pendingVal = undefined; // Back to original
            }

            // Update State
            if (pendingVal !== undefined) {
                STATE.pendingChanges[id] = pendingVal;
            } else {
                delete STATE.pendingChanges[id];
            }

            // Update UI
            td.classList.remove('paid', 'pending-paid', 'pending-remove');
            if (pendingVal !== undefined) {
                if (pendingVal === 1) td.classList.add('pending-paid');
                else td.classList.add('pending-remove');
            } else {
                // Restore original look
                if (currentVal === 1) td.classList.add('paid');
            }

            updateFeeControls();
        }

        function updateFeeControls() {
            const hasChanges = Object.keys(STATE.pendingChanges).length > 0;
            el('fee-controls').style.display = hasChanges ? 'flex' : 'none';

        function resetFeeChanges() {
            STATE.pendingChanges = {};
            document.querySelectorAll('.fee-cell').forEach(td => {
                if (!td.dataset.current) return;
                td.classList.remove('pending-paid', 'pending-remove', 'paid');
                if (td.dataset.current === "1") td.classList.add('paid');
            });
            updateFeeControls();
        }

        async function saveFeeChanges() {
            const confirmed = await customConfirm("変更を保存しますか？");
            if (!confirmed) return;
            loading(true);

            // Group updates by name to avoid race conditions and duplicates
            const groupedUpdates = {};
            Object.keys(STATE.pendingChanges).forEach(key => {
                const [name, sessionKey] = key.split('|');
                if (!groupedUpdates[name]) groupedUpdates[name] = {};
                groupedUpdates[name][sessionKey] = STATE.pendingChanges[key];
            });

            try {
                const names = Object.keys(groupedUpdates);
                const batchPromises = names.map(async name => {
                    const q = query(collection(db, "fees"), where("name", "==", name));
                    const snap = await getDocs(q);
                    const updateData = groupedUpdates[name];

                    if (!snap.empty) {
                        // Existing doc found, update it
                        return setDoc(doc(db, "fees", snap.docs[0].id), updateData, { merge: true });
                    } else {
                        // New doc
                        return addDoc(collection(db, "fees"), { name, ...updateData });
                    }
                });

                await Promise.all(batchPromises);

                // Duel Write to GAS (Async, don't block UI)
                const monthHeaders = ["1回", "2回", "3回", "4回", "5回"];
                const gasUpdates = [];
                names.forEach(name => {
                    Object.keys(groupedUpdates[name]).forEach(sessionKey => {
                        gasUpdates.push({
                            name: name,
                            month: monthHeaders[parseInt(sessionKey.replace('session', '')) - 1],
                            newVal: groupedUpdates[name][sessionKey]
                        });
                    });
                });

                fetch(API, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ type: 'batch_fee', updates: gasUpdates })
                }).catch(e => console.error("GAS Sync Error:", e));

                toast("保存しました");
                STATE.pendingChanges = {}; // Clear after success
            } catch (e) {
                showError(`保存に失敗しました：${e.message || 'ネットワークエラー'}`, saveFeeChanges);
                console.error(e);
            } finally {
                loading(false);
            }
        }

        function buildCalendar() {
            const container = el('calendar-container');
            const excludes = ["2026-03-01", "2026-03-08", "2026-03-15", "2026-03-22", "2026-04-12", "2026-05-10", "2026-06-14", "2026-07-12", "2026-08-09", "2026-09-13", "2026-10-11", "2026-11-08", "2026-12-06", "2026-12-13", "2026-12-20", "2026-12-27"];
            const today = new Date(); today.setHours(0, 0, 0, 0);
            let cardIndex = 0;

            for (let m = 3; m <= 12; m++) {
                const card = document.createElement('section');
                card.className = 'bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-peach/50 relative overflow-hidden opacity-0 translate-y-6';
                card.style.animation = `slideUp 0.5s ease forwards ${cardIndex * 0.08}s`;
                cardIndex++;

                // 月タイトルの構築
                const header = document.createElement('div');
                header.className = 'flex items-center justify-between mb-5';
                const h2 = document.createElement('h2');
                h2.className = 'text-xl font-extrabold text-terracotta flex items-center gap-2';
                h2.innerHTML = `<span class="w-2 h-6 bg-terracotta rounded-full"></span> ${m}月`;
                header.appendChild(h2);

                if (m === 3) {
                    const springTag = document.createElement('span');
                    springTag.className = 'text-[10px] font-bold bg-peach text-terracotta px-2 py-0.5 rounded-full uppercase tracking-wider';
                    springTag.textContent = 'Spring';
                    header.appendChild(springTag);
                } else if (m === 12) {
                    const tag = document.createElement('span');
                    tag.className = 'text-xs font-bold text-warmGray/40';
                    tag.textContent = '納会予定';
                    header.appendChild(tag);
                    const decor = document.createElement('div');
                    decor.className = 'absolute -top-4 -right-4 w-16 h-16 bg-softBlue/20 rounded-full';
                    card.appendChild(decor);
                }
                card.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'flex flex-wrap gap-4';

                let d = new Date(2026, m - 1, 1, 12, 0, 0);
                while (d.getMonth() === m - 1) {
                    const dateStr = `2026-${String(m).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    if ((d.getDay() === 0 || (m === 12 && d.getDate() === 5)) && !excludes.includes(dateStr)) {
                        const btn = document.createElement('button');
                        btn.className = 'tactile-btn w-14 h-14 rounded-full border-2 flex items-center justify-center font-bold text-warmGray transition-colors';

                        if (d < today) {
                            btn.className += ' bg-warmGray/5 border-warmGray/10 text-warmGray/40 cursor-default';
                        } else {
                            btn.className += ' bg-cream border-peach hover:bg-peach';
                        }

                        btn.textContent = d.getDate();
                        if (d >= today) {
                            btn.onclick = (e) => {
                                selectDate(dateStr, btn);
                            };
                        }
                        grid.appendChild(btn);
                    }
                    d.setDate(d.getDate() + 1);
                }
                card.appendChild(grid);
                container.appendChild(card);
            }
        }

        // リップルエフェクト生成
        function createRipple(event, element) {
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';
            element.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        }

                    // 1. Firestore Write
                    const q = query(collection(db, "attendance"), where("date", "==", date), where("name", "==", name));
                    const snap = await getDocs(q);
                    if (status === '削除') {
                        const delPromises = snap.docs.map(d => deleteDoc(doc(db, "attendance", d.id)));
                        await Promise.all(delPromises);
                    } else if (!snap.empty) {
                        await setDoc(doc(db, "attendance", snap.docs[0].id), { status, comment, updatedAt: serverTimestamp() }, { merge: true });
                    } else {
                        await addDoc(collection(db, "attendance"), { date, name, status, comment, updatedAt: serverTimestamp() });
                    }

                    // 2. Dual Write to GAS (Async Sync)
                    fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) })
                        .catch(e => console.error("GAS Sync Error:", e));

                    toast(status === '削除' ? '削除しました' : '完了しました');
                } catch (e) {
                    console.error(e);
                    showError(`送信に失敗しました：${e.message || 'ネットワークエラー'}`, () => el('attendanceForm').requestSubmit());
                } finally {
                    el('btn-submit').disabled = false;
                    loading(false);
                }
            };
            window.onscroll = () => el('back-top').style.display = window.scrollY > 300 ? 'block' : 'none';
            el('back-top').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        };


    </script>
</body>

</html>
